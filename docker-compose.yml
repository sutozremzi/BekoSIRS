# BekoSIRS - Docker Compose
# Tüm servisleri tek komutla başlatır: docker compose up

services:
  # ─────────────────────────────────────────
  # Backend API (Django)
  # ─────────────────────────────────────────
  api:
    build: ./BekoSIRS_api
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=localhost,127.0.0.1,api
      - CORS_ALLOW_ALL_ORIGINS=${CORS_ALLOW_ALL_ORIGINS:-False}
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
    volumes:
      - api_media:/app/media
      - api_logs:/app/logs
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Web Panel (React)
  # ─────────────────────────────────────────
  web:
    build: ./BekoSIRS_Web
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  api_media:
  api_logs:
